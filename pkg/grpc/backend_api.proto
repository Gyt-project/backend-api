syntax = "proto3";

package gyt;

option go_package = "github.com/Gyt-project/backend-api/pkg/grpc;grpc";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// GytService is the main backend API consumed by the API gateway.
service GytService {
  // ─── Auth ────────────────────────────────────────────────────────────────
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);

  // ─── Users ───────────────────────────────────────────────────────────────
  rpc GetUser(GetUserRequest) returns (UserResponse);
  rpc GetCurrentUser(google.protobuf.Empty) returns (UserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // SSH Keys
  rpc ListSSHKeys(ListSSHKeysRequest) returns (ListSSHKeysResponse);
  rpc AddSSHKey(AddSSHKeyRequest) returns (SSHKeyResponse);
  rpc DeleteSSHKey(DeleteSSHKeyRequest) returns (google.protobuf.Empty);

  // ─── Repositories ────────────────────────────────────────────────────────
  rpc CreateRepository(CreateRepoRequest) returns (RepositoryResponse);
  rpc GetRepository(GetRepoRequest) returns (RepositoryResponse);
  rpc ListRepositories(ListReposRequest) returns (ListReposResponse);
  rpc ListUserRepositories(ListUserReposRequest) returns (ListReposResponse);
  rpc ListOrgRepositories(ListOrgReposRequest) returns (ListReposResponse);
  rpc UpdateRepository(UpdateRepoRequest) returns (RepositoryResponse);
  rpc DeleteRepository(DeleteRepoRequest) returns (google.protobuf.Empty);
  rpc RenameRepository(RenameRepoRequest) returns (RepositoryResponse);

  // Repository Content (proxied from git server)
  rpc GetRepositoryTree(GetRepoTreeRequest) returns (RepoTreeResponse);
  rpc GetFileBlob(GetFileBlobRequest) returns (FileBlobResponse);
  rpc ListBranches(ListBranchesRequest) returns (ListBranchesResponse);
  rpc CreateBranch(CreateBranchRequest) returns (BranchResponse);
  rpc DeleteBranch(DeleteBranchRequest) returns (google.protobuf.Empty);
  rpc GetDefaultBranch(GetDefaultBranchRequest) returns (DefaultBranchResponse);
  rpc SetDefaultBranch(SetDefaultBranchRequest) returns (DefaultBranchResponse);
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);
  rpc CreateTag(CreateTagRequest) returns (TagDetailResponse);
  rpc DeleteTag(DeleteTagRequest) returns (google.protobuf.Empty);
  rpc ListCommits(ListCommitsRequest) returns (ListCommitsResponse);
  rpc GetCommit(GetCommitRequest) returns (CommitDetailResponse);
  rpc GetRepositoryStats(GetRepoStatsRequest) returns (RepoStatsResponse);
  rpc GetCloneURLs(GetCloneURLsRequest) returns (CloneURLsResponse);
  rpc CompareBranches(CompareBranchesRequest) returns (CompareResponse);
  rpc CompareCommits(CompareCommitsRequest) returns (CompareResponse);
  rpc GetFileHistory(GetFileHistoryRequest) returns (GetFileHistoryResponse);
  rpc SearchCommits(SearchCommitsRequest) returns (ListCommitsResponse);
  rpc CheckPath(CheckPathRequest) returns (CheckPathResponse);

  // Collaborators
  rpc ListCollaborators(ListCollaboratorsRequest) returns (ListCollaboratorsResponse);
  rpc AddCollaborator(AddCollaboratorRequest) returns (google.protobuf.Empty);
  rpc RemoveCollaborator(RemoveCollaboratorRequest) returns (google.protobuf.Empty);
  rpc UpdateCollaborator(UpdateCollaboratorRequest) returns (google.protobuf.Empty);

  // ─── Organizations ───────────────────────────────────────────────────────
  rpc CreateOrganization(CreateOrgRequest) returns (OrganizationResponse);
  rpc GetOrganization(GetOrgRequest) returns (OrganizationResponse);
  rpc ListOrganizations(ListOrgsRequest) returns (ListOrgsResponse);
  rpc ListUserOrganizations(ListUserOrgsRequest) returns (ListOrgsResponse);
  rpc UpdateOrganization(UpdateOrgRequest) returns (OrganizationResponse);
  rpc DeleteOrganization(DeleteOrgRequest) returns (google.protobuf.Empty);

  // Org Members
  rpc ListOrgMembers(ListOrgMembersRequest) returns (ListOrgMembersResponse);
  rpc AddOrgMember(AddOrgMemberRequest) returns (OrgMemberResponse);
  rpc UpdateOrgMember(UpdateOrgMemberRequest) returns (OrgMemberResponse);
  rpc RemoveOrgMember(RemoveOrgMemberRequest) returns (google.protobuf.Empty);
  rpc GetOrgMembership(GetOrgMembershipRequest) returns (OrgMemberResponse);

  // ─── Stars ───────────────────────────────────────────────────────────────
  rpc StarRepository(StarRepoRequest) returns (google.protobuf.Empty);
  rpc UnstarRepository(UnstarRepoRequest) returns (google.protobuf.Empty);
  rpc CheckStar(CheckStarRequest) returns (CheckStarResponse);
  rpc ListStargazers(ListStargazersRequest) returns (ListStargazersResponse);
  rpc ListStarredRepositories(ListStarredReposRequest) returns (ListReposResponse);

  // ─── Labels ──────────────────────────────────────────────────────────────
  rpc CreateLabel(CreateLabelRequest) returns (LabelResponse);
  rpc GetLabel(GetLabelRequest) returns (LabelResponse);
  rpc ListLabels(ListLabelsRequest) returns (ListLabelsResponse);
  rpc UpdateLabel(UpdateLabelRequest) returns (LabelResponse);
  rpc DeleteLabel(DeleteLabelRequest) returns (google.protobuf.Empty);

  // ─── Issues ──────────────────────────────────────────────────────────────
  rpc CreateIssue(CreateIssueRequest) returns (IssueResponse);
  rpc GetIssue(GetIssueRequest) returns (IssueResponse);
  rpc ListIssues(ListIssuesRequest) returns (ListIssuesResponse);
  rpc UpdateIssue(UpdateIssueRequest) returns (IssueResponse);
  rpc CloseIssue(CloseIssueRequest) returns (IssueResponse);
  rpc ReopenIssue(ReopenIssueRequest) returns (IssueResponse);
  rpc AddIssueLabel(AddIssueLabelRequest) returns (google.protobuf.Empty);
  rpc RemoveIssueLabel(RemoveIssueLabelRequest) returns (google.protobuf.Empty);
  rpc AddIssueAssignee(AddIssueAssigneeRequest) returns (google.protobuf.Empty);
  rpc RemoveIssueAssignee(RemoveIssueAssigneeRequest) returns (google.protobuf.Empty);
  rpc CreateIssueComment(CreateIssueCommentRequest) returns (IssueCommentResponse);
  rpc ListIssueComments(ListIssueCommentsRequest) returns (ListIssueCommentsResponse);
  rpc UpdateIssueComment(UpdateIssueCommentRequest) returns (IssueCommentResponse);
  rpc DeleteIssueComment(DeleteIssueCommentRequest) returns (google.protobuf.Empty);

  // ─── Pull Requests ───────────────────────────────────────────────────────
  rpc CreatePullRequest(CreatePRRequest) returns (PullRequestResponse);
  rpc GetPullRequest(GetPRRequest) returns (PullRequestResponse);
  rpc ListPullRequests(ListPRsRequest) returns (ListPRsResponse);
  rpc UpdatePullRequest(UpdatePRRequest) returns (PullRequestResponse);
  rpc MergePullRequest(MergePRRequest) returns (MergePRResponse);
  rpc ClosePullRequest(ClosePRRequest) returns (PullRequestResponse);
  rpc ReopenPullRequest(ReopenPRRequest) returns (PullRequestResponse);
  rpc GetPullRequestDiff(GetPRDiffRequest) returns (CompareResponse);
  rpc CreatePRComment(CreatePRCommentRequest) returns (PRCommentResponse);
  rpc ListPRComments(ListPRCommentsRequest) returns (ListPRCommentsResponse);
  rpc UpdatePRComment(UpdatePRCommentRequest) returns (PRCommentResponse);
  rpc DeletePRComment(DeletePRCommentRequest) returns (google.protobuf.Empty);
  rpc CreatePRReview(CreatePRReviewRequest) returns (PRReviewResponse);
  rpc ListPRReviews(ListPRReviewsRequest) returns (ListPRReviewsResponse);
  rpc DismissReview(DismissReviewRequest) returns (PRReviewResponse);
  rpc DismissStaleReviews(DismissStaleReviewsRequest) returns (google.protobuf.Empty);
  rpc RequestReview(RequestReviewRequest) returns (google.protobuf.Empty);
  rpc RemoveReviewRequest(RemoveReviewRequestRequest) returns (google.protobuf.Empty);
  rpc ListReviewRequests(ListReviewRequestsRequest) returns (ListReviewRequestsResponse);
  rpc AddPRLabel(AddPRLabelRequest) returns (google.protobuf.Empty);
  rpc RemovePRLabel(RemovePRLabelRequest) returns (google.protobuf.Empty);
  rpc AddPRAssignee(AddPRAssigneeRequest) returns (google.protobuf.Empty);
  rpc RemovePRAssignee(RemovePRAssigneeRequest) returns (google.protobuf.Empty);
  rpc GetPRMergeEligibility(GetPRMergeEligibilityRequest) returns (PRMergeEligibilityResponse);
  rpc HandleBranchPush(BranchPushRequest) returns (BranchPushResponse);

  // ─── Branch Protection ───────────────────────────────────────────────────
  rpc CreateBranchProtection(CreateBranchProtectionRequest) returns (BranchProtectionResponse);
  rpc GetBranchProtection(GetBranchProtectionRequest) returns (BranchProtectionResponse);
  rpc ListBranchProtections(ListBranchProtectionsRequest) returns (ListBranchProtectionsResponse);
  rpc UpdateBranchProtection(UpdateBranchProtectionRequest) returns (BranchProtectionResponse);
  rpc DeleteBranchProtection(DeleteBranchProtectionRequest) returns (google.protobuf.Empty);

  // ─── Webhooks ────────────────────────────────────────────────────────────
  rpc CreateWebhook(CreateWebhookRequest) returns (WebhookResponse);
  rpc GetWebhook(GetWebhookRequest) returns (WebhookResponse);
  rpc ListWebhooks(ListWebhooksRequest) returns (ListWebhooksResponse);
  rpc UpdateWebhook(UpdateWebhookRequest) returns (WebhookResponse);
  rpc DeleteWebhook(DeleteWebhookRequest) returns (google.protobuf.Empty);
  rpc PingWebhook(PingWebhookRequest) returns (google.protobuf.Empty);

  // ─── Search ──────────────────────────────────────────────────────────────
  rpc SearchRepositories(SearchReposRequest) returns (ListReposResponse);
  rpc SearchUsers(SearchUsersRequest) returns (ListUsersResponse);
  rpc SearchIssues(SearchIssuesRequest) returns (ListIssuesResponse);
}

// ═══════════════════════════════════════════════════════════════
// Auth Messages
// ═══════════════════════════════════════════════════════════════

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  optional string display_name = 4;
}

message LoginRequest {
  string login = 1; // username or email
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64  expires_in = 3; // seconds
  UserResponse user = 4;
}

// ═══════════════════════════════════════════════════════════════
// User Messages
// ═══════════════════════════════════════════════════════════════

message UserResponse {
  string uuid = 1;
  string username = 2;
  string email = 3;
  string display_name = 4;
  string bio = 5;
  string avatar_url = 6;
  bool   is_admin = 7;
  google.protobuf.Timestamp created_at = 8;
}

message GetUserRequest {
  string username = 1;
}

message UpdateUserRequest {
  optional string display_name = 1;
  optional string bio = 2;
  optional string avatar_url = 3;
  optional string email = 4;
  optional string password = 5;
}

message DeleteUserRequest {
  string username = 1;
}

message ListUsersRequest {
  optional int32 page = 1;
  optional int32 per_page = 2;
}

message ListUsersResponse {
  repeated UserResponse users = 1;
  int32 total = 2;
  int32 page = 3;
  int32 per_page = 4;
}

// SSH Keys
message SSHKeyResponse {
  uint64 id = 1;
  string name = 2;
  string public_key = 3;
  google.protobuf.Timestamp created_at = 4;
}

message ListSSHKeysRequest {
  string username = 1;
}

message ListSSHKeysResponse {
  repeated SSHKeyResponse keys = 1;
}

message AddSSHKeyRequest {
  string name = 1;
  string public_key = 2;
}

message DeleteSSHKeyRequest {
  uint64 key_id = 1;
}

// ═══════════════════════════════════════════════════════════════
// Repository Messages
// ═══════════════════════════════════════════════════════════════

message RepositoryResponse {
  string uuid = 1;
  string name = 2;
  string description = 3;
  string default_branch = 4;
  bool   is_private = 5;
  bool   is_fork = 6;
  string owner_type = 7; // "user" or "org"
  string owner_name = 8; // username or org name
  int32  stars = 9;
  int32  forks = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message CreateRepoRequest {
  string name = 1;
  optional string description = 2;
  optional bool   is_private = 3;
  optional string org_name = 4;  // if set, creates under org; otherwise under current user
}

message GetRepoRequest {
  string owner = 1; // username or org name
  string name = 2;
}

message ListReposRequest {
  optional int32 page = 1;
  optional int32 per_page = 2;
  optional bool  include_private = 3;
}

message ListUserReposRequest {
  string username = 1;
  optional int32 page = 2;
  optional int32 per_page = 3;
}

message ListOrgReposRequest {
  string org_name = 1;
  optional int32 page = 2;
  optional int32 per_page = 3;
}

message ListReposResponse {
  repeated RepositoryResponse repositories = 1;
  int32 total = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message UpdateRepoRequest {
  string owner = 1;
  string name = 2;
  optional string description = 3;
  optional bool   is_private = 4;
  optional string default_branch = 5;
}

message DeleteRepoRequest {
  string owner = 1;
  string name = 2;
}

message RenameRepoRequest {
  string owner = 1;
  string old_name = 2;
  string new_name = 3;
}

// Repository Content
message GetRepoTreeRequest {
  string owner = 1;
  string name = 2;
  optional string ref = 3;
  optional string path = 4;
}

message TreeEntryResponse {
  string name = 1;
  string path = 2;
  string mode = 3;
  int64  size = 4;
  bool   is_dir = 5;
  bool   is_submodule = 6;
}

message RepoTreeResponse {
  repeated TreeEntryResponse entries = 1;
  string ref = 2;
}

message GetFileBlobRequest {
  string owner = 1;
  string name = 2;
  string path = 3;
  optional string ref = 4;
}

message FileBlobResponse {
  bytes  content = 1;
  int64  size = 2;
  bool   is_binary = 3;
  string path = 4;
}

message ListBranchesRequest {
  string owner = 1;
  string name = 2;
}

message BranchResponse {
  string name = 1;
  string full_name = 2;
  string commit_sha = 3;
}

message ListBranchesResponse {
  repeated BranchResponse branches = 1;
}

message CreateBranchRequest {
  string owner = 1;
  string name = 2;
  string branch_name = 3;
  string source = 4; // source branch name or commit SHA
}

message DeleteBranchRequest {
  string owner = 1;
  string name = 2;
  string branch_name = 3;
}

message GetDefaultBranchRequest {
  string owner = 1;
  string name = 2;
}

message SetDefaultBranchRequest {
  string owner = 1;
  string name = 2;
  string branch_name = 3;
}

message DefaultBranchResponse {
  string branch_name = 1;
}

message ListTagsRequest {
  string owner = 1;
  string name = 2;
}

message TagResponse {
  string name = 1;
  string full_name = 2;
  string commit_sha = 3;
  optional string message = 4;
}

message ListTagsResponse {
  repeated TagResponse tags = 1;
}

message CreateTagRequest {
  string owner = 1;
  string name = 2;
  string tag_name = 3;
  string target = 4;
  optional string message = 5;
}

message TagDetailResponse {
  TagResponse tag = 1;
  CommitResponse commit = 2;
}

message DeleteTagRequest {
  string owner = 1;
  string name = 2;
  string tag_name = 3;
}

message AuthorResponse {
  string name = 1;
  string email = 2;
  google.protobuf.Timestamp when = 3;
}

message CommitResponse {
  string sha = 1;
  AuthorResponse author = 2;
  AuthorResponse committer = 3;
  string message = 4;
  repeated string parent_shas = 5;
}

message ListCommitsRequest {
  string owner = 1;
  string name = 2;
  optional string ref = 3;
  optional int32  limit = 4;
  optional int32  page = 5;
}

message ListCommitsResponse {
  repeated CommitResponse commits = 1;
  int32 page = 2;
  int32 per_page = 3;
  bool  has_more = 4;
}

message GetCommitRequest {
  string owner = 1;
  string name = 2;
  string sha = 3;
}

message FileDiffResponse {
  string path = 1;
  int32  additions = 2;
  int32  deletions = 3;
  string status = 4;
  optional string old_path = 5;
}

message CommitDetailResponse {
  CommitResponse commit = 1;
  repeated FileDiffResponse files = 2;
  int32 total_additions = 3;
  int32 total_deletions = 4;
  int32 files_changed = 5;
  string patch = 6;
}

message GetRepoStatsRequest {
  string owner = 1;
  string name = 2;
}

message RepoStatsResponse {
  int64 size_bytes = 1;
  int64 commit_count = 2;
  int32 branch_count = 3;
  int32 tag_count = 4;
  int32 contributor_count = 5;
  google.protobuf.Timestamp last_commit = 6;
  int32 stars = 7;
  int32 forks = 8;
}

message GetCloneURLsRequest {
  string owner = 1;
  string name = 2;
}

message CloneURLsResponse {
  string ssh_url = 1;
  string http_url = 2;
  string git_url = 3;
}

message CompareBranchesRequest {
  string owner = 1;
  string name = 2;
  string base_branch = 3;
  string head_branch = 4;
}

message CompareCommitsRequest {
  string owner = 1;
  string name = 2;
  string base_sha = 3;
  string head_sha = 4;
}

message CompareResponse {
  repeated CommitResponse commits = 1;
  repeated FileDiffResponse files = 2;
  int32 total_additions = 3;
  int32 total_deletions = 4;
  int32 files_changed = 5;
  int32 commits_ahead = 6;
  string patch = 7; // Full unified diff patch
}

message GetFileHistoryRequest {
  string owner = 1;
  string name = 2;
  string path = 3;
  optional string ref = 4;
  optional int32  limit = 5;
}

message GetFileHistoryResponse {
  repeated CommitResponse commits = 1;
}

message SearchCommitsRequest {
  string owner = 1;
  string name = 2;
  string query = 3;
  optional string author = 4;
  optional string ref = 5;
  optional int32  limit = 6;
}

message CheckPathRequest {
  string owner = 1;
  string name = 2;
  string path = 3;
  optional string ref = 4;
}

message CheckPathResponse {
  bool exists = 1;
  bool is_dir = 2;
  bool is_file = 3;
  optional int64 size = 4;
}

// Collaborators
message CollaboratorResponse {
  string username = 1;
  string access_level = 2; // "read", "write", "admin"
}

message ListCollaboratorsRequest {
  string owner = 1;
  string name = 2;
}

message ListCollaboratorsResponse {
  repeated CollaboratorResponse collaborators = 1;
}

message AddCollaboratorRequest {
  string owner = 1;
  string name = 2;
  string username = 3;
  string access_level = 4;
}

message RemoveCollaboratorRequest {
  string owner = 1;
  string name = 2;
  string username = 3;
}

message UpdateCollaboratorRequest {
  string owner = 1;
  string name = 2;
  string username = 3;
  string access_level = 4;
}

// ═══════════════════════════════════════════════════════════════
// Organization Messages
// ═══════════════════════════════════════════════════════════════

message OrganizationResponse {
  string uuid = 1;
  string name = 2;
  string display_name = 3;
  string description = 4;
  string avatar_url = 5;
  string owner_username = 6;
  int32  member_count = 7;
  int32  repo_count = 8;
  google.protobuf.Timestamp created_at = 9;
}

message CreateOrgRequest {
  string name = 1;
  optional string display_name = 2;
  optional string description = 3;
}

message GetOrgRequest {
  string name = 1;
}

message ListOrgsRequest {
  optional int32 page = 1;
  optional int32 per_page = 2;
}

message ListUserOrgsRequest {
  string username = 1;
}

message ListOrgsResponse {
  repeated OrganizationResponse organizations = 1;
  int32 total = 2;
}

message UpdateOrgRequest {
  string name = 1;
  optional string display_name = 2;
  optional string description = 3;
  optional string avatar_url = 4;
}

message DeleteOrgRequest {
  string name = 1;
}

// Org Members
message OrgMemberResponse {
  UserResponse user = 1;
  string role = 2; // "owner" or "member"
  google.protobuf.Timestamp joined_at = 3;
}

message ListOrgMembersRequest {
  string org_name = 1;
}

message ListOrgMembersResponse {
  repeated OrgMemberResponse members = 1;
}

message AddOrgMemberRequest {
  string org_name = 1;
  string username = 2;
  string role = 3; // "owner" or "member"
}

message UpdateOrgMemberRequest {
  string org_name = 1;
  string username = 2;
  string role = 3;
}

message RemoveOrgMemberRequest {
  string org_name = 1;
  string username = 2;
}

message GetOrgMembershipRequest {
  string org_name = 1;
  string username = 2;
}

// ═══════════════════════════════════════════════════════════════
// Stars Messages
// ═══════════════════════════════════════════════════════════════

message StarRepoRequest {
  string owner = 1;
  string name  = 2;
}

message UnstarRepoRequest {
  string owner = 1;
  string name  = 2;
}

message CheckStarRequest {
  string owner = 1;
  string name  = 2;
}

message CheckStarResponse {
  bool starred = 1;
}

message ListStargazersRequest {
  string owner            = 1;
  string name             = 2;
  optional int32 page     = 3;
  optional int32 per_page = 4;
}

message ListStargazersResponse {
  repeated UserResponse users = 1;
  int32 total                 = 2;
}

message ListStarredReposRequest {
  string username         = 1;
  optional int32 page     = 2;
  optional int32 per_page = 3;
}

// ═══════════════════════════════════════════════════════════════
// Label Messages
// ═══════════════════════════════════════════════════════════════

message LabelResponse {
  uint64 id          = 1;
  string name        = 2;
  string color       = 3; // hex color without '#', e.g. "ff0000"
  string description = 4;
}

message CreateLabelRequest {
  string owner                = 1;
  string repo                 = 2;
  string name                 = 3;
  string color                = 4;
  optional string description = 5;
}

message GetLabelRequest {
  string owner = 1;
  string repo  = 2;
  string name  = 3;
}

message ListLabelsRequest {
  string owner = 1;
  string repo  = 2;
}

message ListLabelsResponse {
  repeated LabelResponse labels = 1;
}

message UpdateLabelRequest {
  string owner                = 1;
  string repo                 = 2;
  string name                 = 3;
  optional string new_name    = 4;
  optional string color       = 5;
  optional string description = 6;
}

message DeleteLabelRequest {
  string owner = 1;
  string repo  = 2;
  string name  = 3;
}

// ═══════════════════════════════════════════════════════════════
// Issue Messages
// ═══════════════════════════════════════════════════════════════

message IssueResponse {
  uint64 id                                     = 1;
  int32  number                                 = 2;
  string title                                  = 3;
  string body                                   = 4;
  string state                                  = 5; // "open" | "closed"
  UserResponse author                           = 6;
  repeated UserResponse assignees               = 7;
  repeated LabelResponse labels                 = 8;
  int32  comment_count                          = 9;
  google.protobuf.Timestamp created_at          = 10;
  google.protobuf.Timestamp updated_at          = 11;
  optional google.protobuf.Timestamp closed_at  = 12;
}

message CreateIssueRequest {
  string owner              = 1;
  string repo               = 2;
  string title              = 3;
  optional string body      = 4;
  repeated string assignees = 5;
  repeated string labels    = 6;
}

message GetIssueRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message ListIssuesRequest {
  string owner             = 1;
  optional string repo     = 2;  // if absent → all repos of the owner
  optional string state    = 3;  // "open" | "closed" | "all"
  optional string label    = 4;
  optional string assignee = 5;
  optional string author   = 6;
  optional int32  page     = 7;
  optional int32  per_page = 8;
}

message ListIssuesResponse {
  repeated IssueResponse issues = 1;
  int32 total                   = 2;
  int32 page                    = 3;
  int32 per_page                = 4;
}

message UpdateIssueRequest {
  string owner          = 1;
  string repo           = 2;
  int32  number         = 3;
  optional string title = 4;
  optional string body  = 5;
}

message CloseIssueRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message ReopenIssueRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message AddIssueLabelRequest {
  string owner      = 1;
  string repo       = 2;
  int32  number     = 3;
  string label_name = 4;
}

message RemoveIssueLabelRequest {
  string owner      = 1;
  string repo       = 2;
  int32  number     = 3;
  string label_name = 4;
}

message AddIssueAssigneeRequest {
  string owner    = 1;
  string repo     = 2;
  int32  number   = 3;
  string username = 4;
}

message RemoveIssueAssigneeRequest {
  string owner    = 1;
  string repo     = 2;
  int32  number   = 3;
  string username = 4;
}

message IssueCommentResponse {
  uint64 id                            = 1;
  string body                          = 2;
  UserResponse author                  = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message CreateIssueCommentRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
  string body   = 4;
}

message ListIssueCommentsRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message ListIssueCommentsResponse {
  repeated IssueCommentResponse comments = 1;
}

message UpdateIssueCommentRequest {
  string owner      = 1;
  string repo       = 2;
  uint64 comment_id = 3;
  string body       = 4;
}

message DeleteIssueCommentRequest {
  string owner      = 1;
  string repo       = 2;
  uint64 comment_id = 3;
}

// ═══════════════════════════════════════════════════════════════
// Pull Request Messages
// ═══════════════════════════════════════════════════════════════

message PullRequestResponse {
  uint64 id                                     = 1;
  int32  number                                 = 2;
  string title                                  = 3;
  string body                                   = 4;
  string state                                  = 5; // "open" | "closed" | "merged"
  string head_branch                            = 6;
  string base_branch                            = 7;
  string head_sha                               = 8;
  UserResponse author                           = 9;
  repeated UserResponse assignees               = 10;
  repeated LabelResponse labels                 = 11;
  bool   mergeable                              = 12;
  bool   merged                                 = 13;
  int32  comment_count                          = 14;
  int32  commits                                = 15;
  int32  additions                              = 16;
  int32  deletions                              = 17;
  int32  changed_files                          = 18;
  google.protobuf.Timestamp created_at          = 19;
  google.protobuf.Timestamp updated_at          = 20;
  optional google.protobuf.Timestamp merged_at  = 21;
}

message CreatePRRequest {
  string owner              = 1;
  string repo               = 2;
  string title              = 3;
  string head_branch        = 4;
  string base_branch        = 5;
  optional string body      = 6;
  repeated string assignees = 7;
  repeated string labels    = 8;
}

message GetPRRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message ListPRsRequest {
  string owner             = 1;
  optional string repo     = 2;  // if absent → all repos of the owner
  optional string state    = 3;  // "open" | "closed" | "merged" | "all"
  optional string author   = 4;
  optional string assignee = 5;
  optional string label    = 6;
  optional string base     = 7;
  optional int32  page     = 8;
  optional int32  per_page = 9;
}

message ListPRsResponse {
  repeated PullRequestResponse pull_requests = 1;
  int32 total                                = 2;
  int32 page                                 = 3;
  int32 per_page                             = 4;
}

message UpdatePRRequest {
  string owner          = 1;
  string repo           = 2;
  int32  number         = 3;
  optional string title = 4;
  optional string body  = 5;
  optional string base  = 6;
}

message MergePRRequest {
  string owner                   = 1;
  string repo                    = 2;
  int32  number                  = 3;
  optional string merge_method   = 4;  // "merge" | "squash" | "rebase"
  optional string commit_title   = 5;
  optional string commit_message = 6;
}

message MergePRResponse {
  bool   merged  = 1;
  string sha     = 2;
  string message = 3;
}

message ClosePRRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message ReopenPRRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message GetPRDiffRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message PRCommentResponse {
  uint64 id                            = 1;
  string body                          = 2;
  UserResponse author                  = 3;
  optional string path                 = 4;  // file path for inline comments
  optional int32  line                 = 5;  // line number for inline comments
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  optional string commit_sha           = 8;  // commit SHA when the comment was created
}

message CreatePRCommentRequest {
  string owner               = 1;
  string repo                = 2;
  int32  number              = 3;
  string body                = 4;
  optional string path       = 5;
  optional int32  line       = 6;
  optional string commit_sha = 7;
}

message ListPRCommentsRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message ListPRCommentsResponse {
  repeated PRCommentResponse comments = 1;
}

message UpdatePRCommentRequest {
  string owner      = 1;
  string repo       = 2;
  uint64 comment_id = 3;
  string body       = 4;
}

message DeletePRCommentRequest {
  string owner      = 1;
  string repo       = 2;
  uint64 comment_id = 3;
}

message PRReviewResponse {
  uint64 id                              = 1;
  UserResponse reviewer                  = 2;
  string state                           = 3; // "APPROVED" | "CHANGES_REQUESTED" | "COMMENTED" | "DISMISSED"
  string body                            = 4;
  google.protobuf.Timestamp submitted_at = 5;
  bool   dismissed                       = 6;
  string dismiss_reason                  = 7;
}

message DismissReviewRequest {
  string owner     = 1;
  string repo      = 2;
  uint64 review_id = 3;
  string reason    = 4;
}

message DismissStaleReviewsRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

// ═══════════════════════════════════════════════════════════════
// Branch Protection Messages
// ═══════════════════════════════════════════════════════════════

message BranchProtectionResponse {
  uint64 id                              = 1;
  string pattern                         = 2;
  bool   require_pull_request            = 3;
  int32  required_approvals              = 4;
  bool   dismiss_stale_reviews           = 5;
  bool   block_force_push                = 6;
  google.protobuf.Timestamp created_at   = 7;
  google.protobuf.Timestamp updated_at   = 8;
}

message CreateBranchProtectionRequest {
  string owner                 = 1;
  string repo                  = 2;
  string pattern               = 3;
  bool   require_pull_request  = 4;
  int32  required_approvals    = 5;
  bool   dismiss_stale_reviews = 6;
  bool   block_force_push      = 7;
}

message GetBranchProtectionRequest {
  string owner = 1;
  string repo  = 2;
  uint64 id    = 3;
}

message ListBranchProtectionsRequest {
  string owner = 1;
  string repo  = 2;
}

message ListBranchProtectionsResponse {
  repeated BranchProtectionResponse rules = 1;
}

message UpdateBranchProtectionRequest {
  string owner                       = 1;
  string repo                        = 2;
  uint64 id                          = 3;
  optional string pattern            = 4;
  optional bool   require_pull_request  = 5;
  optional int32  required_approvals    = 6;
  optional bool   dismiss_stale_reviews = 7;
  optional bool   block_force_push      = 8;
}

message DeleteBranchProtectionRequest {
  string owner = 1;
  string repo  = 2;
  uint64 id    = 3;
}

message CreatePRReviewRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
  string state  = 4; // "APPROVE" | "REQUEST_CHANGES" | "COMMENT"
  string body   = 5;
}

message ListPRReviewsRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message ListPRReviewsResponse {
  repeated PRReviewResponse reviews = 1;
}

message RequestReviewRequest {
  string owner    = 1;
  string repo     = 2;
  int32  number   = 3;
  string username = 4;
}

message RemoveReviewRequestRequest {
  string owner    = 1;
  string repo     = 2;
  int32  number   = 3;
  string username = 4;
}

message ListReviewRequestsRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message ReviewRequestResponse {
  uint64 id                                = 1;
  UserResponse reviewer                    = 2;
  UserResponse requested_by                = 3;
  google.protobuf.Timestamp created_at     = 4;
}

message ListReviewRequestsResponse {
  repeated ReviewRequestResponse requests = 1;
}

message AddPRLabelRequest {
  string owner      = 1;
  string repo       = 2;
  int32  number     = 3;
  string label_name = 4;
}

message RemovePRLabelRequest {
  string owner      = 1;
  string repo       = 2;
  int32  number     = 3;
  string label_name = 4;
}

message AddPRAssigneeRequest {
  string owner    = 1;
  string repo     = 2;
  int32  number   = 3;
  string username = 4;
}

message RemovePRAssigneeRequest {
  string owner    = 1;
  string repo     = 2;
  int32  number   = 3;
  string username = 4;
}

message GetPRMergeEligibilityRequest {
  string owner  = 1;
  string repo   = 2;
  int32  number = 3;
}

message PRMergeEligibilityResponse {
  bool   can_merge                  = 1;
  string reason                     = 2;
  int32  required_approvals         = 3;
  int32  current_approvals          = 4;
  bool   blocked_by_changes_request = 5;
}

message BranchPushRequest {
  string owner  = 1;
  string repo   = 2;
  string branch = 3;
}

message BranchPushResponse {
  repeated int32 pr_numbers = 1;
}

// ═══════════════════════════════════════════════════════════════
// Webhook Messages
// ═══════════════════════════════════════════════════════════════

message WebhookResponse {
  uint64 id                            = 1;
  string url                           = 2;
  repeated string events               = 3;
  bool   active                        = 4;
  string content_type                  = 5; // "json" | "form"
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateWebhookRequest {
  string owner                  = 1;
  optional string repo          = 2;  // if absent → org-level webhook
  string url                    = 3;
  repeated string events        = 4;
  optional string secret        = 5;
  optional bool   active        = 6;
  optional string content_type  = 7;
}

message GetWebhookRequest {
  string owner         = 1;
  optional string repo = 2;
  uint64 id            = 3;
}

message ListWebhooksRequest {
  string owner         = 1;
  optional string repo = 2;
}

message ListWebhooksResponse {
  repeated WebhookResponse webhooks = 1;
}

message UpdateWebhookRequest {
  string owner                  = 1;
  optional string repo          = 2;
  uint64 id                     = 3;
  optional string url           = 4;
  repeated string events        = 5;
  optional bool   active        = 6;
  optional string secret        = 7;
  optional string content_type  = 8;
}

message DeleteWebhookRequest {
  string owner         = 1;
  optional string repo = 2;
  uint64 id            = 3;
}

message PingWebhookRequest {
  string owner         = 1;
  optional string repo = 2;
  uint64 id            = 3;
}

// ═══════════════════════════════════════════════════════════════
// Search Messages
// ═══════════════════════════════════════════════════════════════

message SearchReposRequest {
  string query              = 1;
  optional string language  = 2;
  optional string sort      = 3;  // "stars" | "forks" | "updated"
  optional string order     = 4;  // "asc" | "desc"
  optional int32  page      = 5;
  optional int32  per_page  = 6;
}

message SearchUsersRequest {
  string query             = 1;
  optional string sort     = 2;  // "joined" | "repositories"
  optional string order    = 3;  // "asc" | "desc"
  optional int32  page     = 4;
  optional int32  per_page = 5;
}

message SearchIssuesRequest {
  string query             = 1;
  optional string state    = 2;  // "open" | "closed"
  optional string type     = 3;  // "issue" | "pr"
  optional string owner    = 4;
  optional string repo     = 5;
  optional string author   = 6;
  optional string label    = 7;
  optional string sort     = 8;  // "created" | "updated" | "comments"
  optional string order    = 9;  // "asc" | "desc"
  optional int32  page     = 10;
  optional int32  per_page = 11;
}

