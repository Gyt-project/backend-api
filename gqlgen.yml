schema:
  - pkg/gql/schema.graphql
exec:
  filename: pkg/gql/generated.go
  package: gql
model:
  filename: pkg/gql/model/models_gen.go
  package: model
resolver:
  layout: follow-schema
  dir: pkg/gql
  package: gql
  filename_template: "{name}.resolvers.go"
autobind: []
models:
  Time:
    model: github.com/99designs/gqlgen/graphql.Time
